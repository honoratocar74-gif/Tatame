<style>
:root{
  --bg:#12151a; --bg-grid:#171b21; --surface:#1b1f27; --surface-2:#232834; --border:#2a3040;
  --text:#f2f0ea; --text-dim:#9aa2b1; --text-faint:#5f6675;
  --tatami:#4c8264; --tatami-light:#6ba382; --tatami-dim:rgba(76,130,100,.15);
  --gold:#cc9f2c; --gold-light:#e6be4d; --gold-dim:rgba(204,159,44,.15);
  --danger:#d1583f; --danger-dim:rgba(209,88,63,.15); --ok:#4c8264;
  --shadow:0 10px 30px -12px rgba(0,0,0,.5); --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:linear-gradient(var(--bg-grid) 1px,transparent 1px) 0 0/100% 42px,linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px) 0 0/42px 100%,var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,h3,.display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.03em}
::selection{background:var(--tatami);color:#fff}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:inherit}
#app{display:flex;min-height:100vh}
.sidebar{width:230px;flex:0 0 230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(155deg,var(--tatami),#2f5642);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:var(--shadow)}
.brand-name{font-family:'Oswald';font-weight:700;font-size:19px;letter-spacing:.04em;line-height:1.1}
.brand-sub{font-size:10.5px;color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;border:none;background:transparent;color:var(--text-dim);font-size:13.5px;font-weight:600;text-align:left;transition:.15s}
.nav-item svg{flex:none;opacity:.85}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--tatami-dim);color:var(--tatami-light)}
.nav-item.active svg{opacity:1}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-faint)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 30px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.topbar h1{font-size:24px;margin:0;color:var(--text)}
.topbar .today{color:var(--text-faint);font-size:12.5px;margin-top:2px}
.content{padding:26px 30px 60px;flex:1}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;transition:.15s}
.btn:hover{border-color:var(--tatami)}
.btn-primary{background:var(--tatami);border-color:var(--tatami);color:#0d1410}
.btn-primary:hover{background:var(--tatami-light);border-color:var(--tatami-light)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{color:var(--danger)}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn-icon{padding:8px;border-radius:9px}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.grid-4,.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-card{position:relative;overflow:hidden}
.stat-card .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);font-weight:600}
.stat-card .val{font-family:'Oswald';font-size:32px;margin-top:6px;line-height:1}
.stat-card .sub{font-size:12px;color:var(--text-dim);margin-top:6px}
.stat-card .accent{position:absolute;right:14px;top:14px;opacity:.5}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:30px 0 12px}
.section-title h2{font-size:15px;margin:0;color:var(--text-dim);letter-spacing:.05em}
.section-title:first-child{margin-top:0}
.class-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.02em;border:1px solid rgba(0,0,0,.25)}
.class-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:none}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
.input,.select,.textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:9px;font-size:13.5px;outline:none;transition:.15s}
.input:focus,.select:focus,.textarea:focus{border-color:var(--tatami)}
.search-wrap .input{padding-left:36px}
.textarea{resize:vertical;min-height:70px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.athlete-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:.15s}
.athlete-row:hover{border-color:var(--tatami)}
.avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:15px;flex:none;color:#0d1410}
.athlete-row .info{flex:1;min-width:0}
.athlete-row .name{font-weight:700;font-size:14.5px}
.athlete-row .meta{font-size:12px;color:var(--text-faint);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.athlete-row .rate{width:90px;flex:none}
.athlete-row .rate .pct{font-family:'IBM Plex Mono';font-size:12px;text-align:right;color:var(--text-dim);margin-bottom:4px}
.bar-track{height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden}
.bar-fill{height:100%;background:var(--tatami)}
.athlete-row .row-actions{display:flex;gap:4px;flex:none}
.empty{text-align:center;padding:50px 20px;color:var(--text-faint)}
.empty svg{opacity:.4;margin-bottom:12px}
.empty .title{color:var(--text-dim);font-weight:600;margin-bottom:4px}
.alert{display:flex;gap:12px;padding:13px 15px;border-radius:11px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px;align-items:flex-start}
.alert svg{flex:none;margin-top:1px}
.alert.warn{border-color:rgba(204,159,44,.4);background:var(--gold-dim)}
.alert.danger{border-color:rgba(209,88,63,.4);background:var(--danger-dim)}
.alert .t{font-weight:600;font-size:13.5px}
.alert .d{font-size:12px;color:var(--text-dim);margin-top:2px}
.overlay{position:fixed;inset:0;background:rgba(8,10,13,.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.modal-head h3{margin:0;font-size:17px}
.modal-body{padding:22px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;white-space:nowrap;background:transparent;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--tatami-light);border-color:var(--tatami)}
.seg{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;flex:none}
.seg button{padding:7px 11px;font-size:11.5px;font-weight:700;background:var(--surface-2);color:var(--text-faint);border:none;border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button.on-present{background:var(--tatami-dim);color:var(--tatami-light)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--text-faint);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:11px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.table-wrap{overflow-x:auto}
#toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--surface-2);border:1px solid var(--tatami);color:var(--text);padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);animation:in .2s ease}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spark{display:flex;align-items:flex-end;gap:3px;height:44px}
.spark b{flex:1;background:var(--tatami);border-radius:2px;min-height:3px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border)}
.bottom-nav{display:none}
@media(max-width:840px){
  .sidebar{display:none}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:50;padding:6px 4px calc(env(safe-area-inset-bottom) + 4px)}
  .bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text-faint);font-size:9.5px;font-weight:600;padding:6px 2px}
  .bottom-nav button.active{color:var(--tatami-light)}
  .content{padding:18px 16px 90px}
  .topbar{padding:16px}
  .field-row{grid-template-columns:1fr}
}
.scrim-note{font-size:11px;color:var(--text-faint);margin-top:14px;text-align:center}
.wl-input{width:48px;padding:5px 4px;text-align:center}
</style>
</head>

<div id="app"></div>
<div id="toast-wrap"></div>

function esc(s){ return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function maskBRDate(value){ let d=value.replace(/\D/g,'').slice(0,8); if(d.length>=5) return d.slice(0,2)+'/'+d.slice(2,4)+'/'+d.slice(4); if(d.length>=3) return d.slice(0,2)+'/'+d.slice(2); return d; }
function parseCategoryLimit(cat){ if(!cat) return null; const m=cat.match(/^([+-])(\d+(\.\d+)?)/); if(!m) return null; return {sign:m[1], limit:parseFloat(m[2])}; }
function sessionsForDate(date){ const dow=new Date(date+'T00:00:00').getDay(); return (dow===2||dow===4)?[1,2]:[1]; }

// Fallback in-memory store used whenever persistent storage isn't available or fails (e.g. this webview/runtime), so the app keeps working normally for the current session even without cross-session persistence.
const _memoryStore = {};
let _storageWarned = false;
function warnStorageOnce(){
  if(_storageWarned) return; _storageWarned = true;
  setTimeout(()=>toast('Aviso: salvamento permanente indisponível agora — os dados funcionam normalmente nesta sessão.'), 400);
}
async function storageGet(key,fallback){
  try{
    if(typeof window==='undefined' || !window.storage){ return (key in _memoryStore) ? JSON.parse(_memoryStore[key]) : fallback; }
    const r=await window.storage.get(key,false); if(r&&r.value!=null) return JSON.parse(r.value); return fallback;
  }catch(e){ return (key in _memoryStore) ? JSON.parse(_memoryStore[key]) : fallback; }
}
async function storageSet(key,value){
  try{
    if(typeof window==='undefined' || !window.storage){ _memoryStore[key]=JSON.stringify(value); return; }
    await window.storage.set(key, JSON.stringify(value), false);
  }catch(e){ _memoryStore[key]=JSON.stringify(value); console.warn('storage set fallback (in-memory) for', key); warnStorageOnce(); }
}

async function loadAll(){

  ]);

}

function activeAthletes(){ return state.athletes.filter(a=>a.active!==false); }
function athleteById(id){ return state.athletes.find(a=>a.id===id); }

function attendanceRate(athleteId,days=30){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
  let total=0,sum=0;
  Object.entries(state.sessions).forEach(([key,s])=>{
    const date=key.split('__')[0];
    if(new Date(date+'T00:00:00')<cutoff) return;
    const rec=s.records[athleteId]; if(!rec) return;
    const w=statusWeight(rec.status); if(w===null) return;
    total++; sum+=w;
  });
  if(total===0) return null;
  return Math.round(sum/total*100);
}
function dailyLoadMap(athleteId){
  const map={};
  Object.entries(state.sessions).forEach(([key,s])=>{
    const date=key.split('__')[0];
    const rec=s.records[athleteId];
    if(rec && rec.pse!=null) map[date]=(map[date]||0)+rec.pse;
  });
  return map;
}
function computeACWR(athleteId){
  const map=dailyLoadMap(athleteId);
  function sumWindow(days){ let sum=0; const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days); Object.entries(map).forEach(([d,v])=>{ if(new Date(d+'T00:00:00')>=cutoff) sum+=v; }); return sum; }
  const acute=sumWindow(7)/7, chronic=sumWindow(28)/28;
  if(chronic===0) return null;
  return +(acute/chronic).toFixed(2);
}
function acwrInfo(v){
  if(v===null) return {label:'Dados insuficientes',color:'var(--text-faint)'};
  if(v<0.8) return {label:'Carga baixa',color:'var(--tatami-light)'};
  if(v<=1.3) return {label:'Zona ideal',color:'var(--ok)'};
  if(v<=1.5) return {label:'Atenção',color:'var(--gold-light)'};
  return {label:'Risco alto',color:'var(--danger)'};
}
function lastWeighIn(a){ if(!a.weighIns||!a.weighIns.length) return null; return a.weighIns[a.weighIns.length-1]; }
function weighInsights(a){
  const wi=(a.weighIns||[]);
  const last=wi[wi.length-1], prev=wi[wi.length-2];
  const lastTwoDiff = (last&&prev)? +(last.weight-prev.weight).toFixed(1) : null;
  const catInfo = parseCategoryLimit(a.category);
  let catText=null;
  if(last && catInfo){
    const diffKg = +(last.weight-catInfo.limit).toFixed(1);
    const diffPct = +((diffKg/catInfo.limit)*100).toFixed(1);
    if(catInfo.sign==='-'){
      catText = diffKg>0 ? {text:`${diffKg} kg acima do limite (${diffPct}%) — precisa cortar peso`, color:'var(--danger)'}
                          : {text:`${Math.abs(diffKg)} kg de margem (${Math.abs(diffPct)}%) abaixo do limite`, color:'var(--tatami-light)'};
    } else {
      catText = diffKg<0 ? {text:`${Math.abs(diffKg)} kg abaixo do mínimo (${Math.abs(diffPct)}%) — precisa ganhar peso`, color:'var(--danger)'}
                          : {text:`${diffKg} kg acima do mínimo (${diffPct}%) — dentro da categoria`, color:'var(--tatami-light)'};
    }
  }
  return {lastTwoDiff, catText};
}
function activeInjuries(a){ return (a.injuries||[]).filter(i=>i.status==='ativa'); }
function allActiveInjuriesFlat(){ const out=[]; state.athletes.forEach(a=>{ activeInjuries(a).forEach(i=>out.push({athlete:a,injury:i})); }); return out; }
function upcomingEvents(limit=null){ const t=todayStr(); let list=state.events.filter(e=>e.date>=t).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'')); return limit?list.slice(0,limit):list; }
function upcomingCompetitions(limit=null){ const t=todayStr(); let list=state.competitions.filter(c=>compDates(c).end>=t).sort((a,b)=>compDates(a).start.localeCompare(compDates(b).start)); return limit?list.slice(0,limit):list; }
function entryTotals(e){
  const w=e.wins||{},l=e.losses||{};
  const bw=WL_KEYS.reduce((s,k)=>s+(w[k]||0),0), bl=WL_KEYS.reduce((s,k)=>s+(l[k]||0),0);
  const tw = (e.totalWins!=null && e.totalWins>0) ? e.totalWins : bw;
  const tl = (e.totalLosses!=null && e.totalLosses>0) ? e.totalLosses : bl;
  return {w:tw, l:tl};
}
function compDates(c){ return {start:c.date||'', end:c.endDate||c.date||''}; }
function compDateLabel(c){ const d=compDates(c); if(!d.start) return '—'; if(!d.end||d.end===d.start) return fmtDate(d.start); return fmtDate(d.start)+' – '+fmtDate(d.end); }
function compSortDate(c){ return compDates(c).start; }
// Alertas de retorno (nutricionista 60 dias, psicólogo 15 dias) a partir do último atendimento de cada atleta.
// windowDays=null retorna todos os retornos calculados; um número limita a janela (inclui atrasados).
function computeReturnAlerts(windowDays){
  const out=[]; const today=todayStr();
  Object.entries(RETURN_RULES).forEach(([type,days])=>{
    const lastByAthlete={};
    state.events.filter(e=>e.type===type && e.athleteId && e.date<=today).forEach(e=>{
      if(!lastByAthlete[e.athleteId] || e.date>lastByAthlete[e.athleteId].date) lastByAthlete[e.athleteId]=e;
    });
    Object.entries(lastByAthlete).forEach(([athleteId,ev])=>{
      const a=athleteById(athleteId); if(!a||a.active===false) return;
      const rd=new Date(ev.date+'T00:00:00'); rd.setDate(rd.getDate()+days);
      const returnStr=rd.toISOString().slice(0,10);
      const d=daysBetween(today,returnStr);
      if(windowDays==null || d<=windowDays) out.push({athlete:a,type,lastDate:ev.date,returnStr,d});
    });
  });
  return out.sort((x,y)=>x.d-y.d);
}

function viewDashboard(){
  const active=activeAthletes(); const today=todayStr();
  const todayKeys=Object.entries(state.sessions).filter(([k])=>k.startsWith(today+'__'));
  let presentToday=0,totalToday=0;
  todayKeys.forEach(([,s])=>Object.values(s.records).forEach(r=>{ totalToday++; if(r.status==='presente'||r.status==='competicao') presentToday++; }));
  const injuries=allActiveInjuriesFlat();
  const nextComp=upcomingCompetitions(1)[0];
  const alerts=[];
  active.forEach(a=>{
    const lw=lastWeighIn(a); const d=lw?daysBetween(lw.date,today):null;
    if(!lw||d>45) alerts.push({level:'warn',t:`${a.name}: pesagem pendente`,d:lw?`Última pesagem há ${d} dias`:'Nenhuma pesagem registrada'});
    const rate=attendanceRate(a.id,30);
    if(rate!==null&&rate<60) alerts.push({level:'danger',t:`${a.name}: frequência baixa`,d:`${rate}% de presença nos últimos 30 dias`});
    const acwr=computeACWR(a.id);
    if(acwr!==null&&acwr>1.5) alerts.push({level:'danger',t:`${a.name}: ACWR em risco (${acwr})`,d:'Carga aguda muito acima da crônica — risco de lesão'});
  });

  computeReturnAlerts(7).forEach(r=>{
    const label = r.type==='Nutricionista'?'retorno nutricional':'retorno psicológico';
    const when = r.d<0?`atrasado ${Math.abs(r.d)} dia(s)`:r.d===0?'hoje':`em ${r.d} dia(s)`;
    alerts.push({level:r.d<0?'danger':'warn',t:`${r.athlete.name}: ${label}`,d:`Previsto para ${fmtDate(r.returnStr)} (${when})`});
  });
  if(nextComp){ const d=daysBetween(today,compDates(nextComp).start); if(d<=14) alerts.push({level:'warn',t:`Prova em ${d} dia(s): ${nextComp.name}`,d:compDateLabel(nextComp)+' · '+(nextComp.location||'local a definir')}); }
  const recentSessions=Object.entries(state.sessions).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);
  return `

      <div class="card stat-card"><div class="accent">${icon('check',26)}</div><div class="lbl">Presença hoje</div><div class="val mono">${totalToday?Math.round(presentToday/totalToday*100)+'%':'—'}</div><div class="sub">${totalToday?presentToday+' de '+totalToday+' registrados':'Sessão ainda não registrada'}</div></div>
      <div class="card stat-card"><div class="accent">${icon('alert',26)}</div><div class="lbl">Lesões ativas</div><div class="val mono">${injuries.length}</div><div class="sub">Acompanhamento necessário</div></div>
      <div class="card stat-card"><div class="accent">${icon('trophy',26)}</div><div class="lbl">Próxima prova</div><div class="val mono" style="font-size:20px">${nextComp?compDateLabel(nextComp):'—'}</div><div class="sub">${nextComp?esc(nextComp.name):'Nenhuma prova agendada'}</div></div>
    </div>
    <div class="grid grid-2" style="align-items:start;margin-top:6px">
      <div><div class="section-title"><h2>Alertas</h2></div>
        ${alerts.length?alerts.slice(0,8).map(a=>`<div class="alert ${a.level}">${icon(a.level==='danger'?'alert':'clock',18)}<div><div class="t">${esc(a.t)}</div><div class="d">${esc(a.d)}</div></div></div>`).join(''):`<div class="empty" style="padding:24px">${icon('check',30)}<div class="title">Tudo em dia</div>Nenhum alerta no momento.</div>`}
      </div>
      <div><div class="section-title"><h2>Últimas sessões</h2></div>
        ${recentSessions.length?recentSessions.map(([key,s])=>{
          const [date,n]=key.split('__'); const recs=Object.values(s.records); const present=recs.filter(r=>r.status==='presente'||r.status==='competicao').length;
          const pses=recs.filter(r=>r.pse!=null).map(r=>r.pse); const avgPse=pses.length?(pses.reduce((a,b)=>a+b,0)/pses.length).toFixed(1):'—';
          return `<div class="card" style="padding:13px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-weight:700;font-size:13.5px">${fmtDateLong(date)} <span class="mono" style="font-weight:400;color:var(--text-faint);font-size:11.5px">Treino ${n}</span></div><div style="font-size:12px;color:var(--text-faint)">${esc(s.type||'Treino')}</div></div>
            <div style="text-align:right"><div class="mono" style="font-size:13px">${present}/${recs.length} presentes</div><div style="font-size:11.5px;color:var(--text-faint)">PSE médio ${avgPse}</div></div>
          </div>`;
        }).join(''):`<div class="empty" style="padding:24px">${icon('calendar',30)}<div class="title">Sem registros</div>Registre a presença em "Presença".</div>`}
      </div>
    </div>
  `;
}

/* ================= ATLETAS ================= */
function classBadge(cls){ const s=CLASS_STYLE[cls]||CLASS_STYLE['sub-13']; return `<span class="class-badge" style="background:${s.bg};color:${s.fg}"><span class="class-dot"></span>${esc(cls||'—')}</span>`; }

function viewAthletes(){
  const q=state.ui.search.toLowerCase(); const filter=state.ui.classFilter;

}

function viewAthleteDetail(a){

      <button class="tab ${tab==='lesoes'?'active':''}" data-action="athlete-tab" data-tab="lesoes" data-id="${a.id}">Lesões</button>

      </div>`:''}
  `;

/* ================= PRESENÇA ================= */
function viewAttendance(){
  const date=state.ui.attDate; const avail=sessionsForDate(date);
  if(!avail.includes(state.ui.attSession)) state.ui.attSession=avail[0];
  const key=date+'__'+state.ui.attSession;
  const session=state.sessions[key]||{type:state.ui.attType,notes:'',records:{}};
  const active=activeAthletes().sort((a,b)=>a.name.localeCompare(b.name));
  const history=Object.entries(state.sessions).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12);
  return `
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">
        <div class="field" style="margin:0"><label>Data da sessão</label><input type="date" class="input" id="att-date" value="${date}"></div>
        ${avail.length>1?`<div class="field" style="margin:0"><label>Sessão (terça/quinta = 2 treinos)</label><div class="seg">${avail.map(n=>`<button class="${state.ui.attSession===n?'on-present':''}" data-action="set-att-session" data-n="${n}">Treino ${n}</button>`).join('')}</div></div>`:''}
        <div class="field" style="margin:0"><label>Tipo</label><select class="select" id="att-type">${['Treino','Avaliação','Outro'].map(t=>`<option ${session.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
        <button class="btn btn-primary" data-action="save-session" data-key="${key}" style="height:41px">${icon('check',15)} Salvar sessão</button>
      </div>
      ${active.length?`<div style="display:flex;flex-direction:column;gap:8px" id="att-rows">
        ${active.map(a=>{
          const r=session.records[a.id]||{status:'falta',pse:null,obs:''};
          const cls=athleteClasse(a); const s=CLASS_STYLE[cls]||CLASS_STYLE['sub-13'];
          const showObs=['falta','justificada','atestado'].includes(r.status);
          return `<div class="athlete-row" style="cursor:default;flex-wrap:wrap" data-att-row data-id="${a.id}">
            <div class="avatar" style="width:34px;height:34px;font-size:12px;background:${s.bg};color:${s.fg}">${initials(a.name)}</div>
            <div class="info"><div class="name" style="font-size:13.5px">${esc(a.name)}</div><div class="meta">${esc(a.category||'')}</div></div>
            <select class="select" data-status-select style="width:auto;font-size:12px;padding:6px 8px;color:${STATUS_META[r.status].color}">${STATUS_ORDER.map(k=>`<option value="${k}" ${r.status===k?'selected':''}>${STATUS_META[k].label}</option>`).join('')}</select>
            <input type="number" min="0" max="10" class="input mono" data-pse placeholder="PSE" value="${r.pse??''}" style="width:64px;text-align:center" ${r.status!=='presente'?'disabled':''}>
            <input type="text" class="input" data-obs placeholder="Observação" value="${esc(r.obs||'')}" style="max-width:180px;flex:1;min-width:120px;${showObs?'':'display:none'}">
          </div>`;
        }).join('')}
      </div>`:`<div class="empty">${icon('users',30)}<div class="title">Nenhum atleta cadastrado</div>Cadastre atletas para registrar presença.</div>`}
    </div>
    <div class="section-title"><h2>Histórico de sessões</h2></div>
    ${history.length?`<div class="table-wrap"><table><tr><th>Data</th><th>Sessão</th><th>Tipo</th><th>Presentes</th><th>PSE médio</th></tr>
    ${history.map(([k,s])=>{
      const [d,n]=k.split('__'); const recs=Object.values(s.records); const present=recs.filter(r=>r.status==='presente'||r.status==='competicao').length;
      const pses=recs.filter(r=>r.pse!=null).map(r=>r.pse); const avg=pses.length?(pses.reduce((a,b)=>a+b,0)/pses.length).toFixed(1):'—';

    }).join('')}</table></div>`:`<div class="empty">${icon('calendar',30)}<div class="title">Sem histórico</div>Salve sua primeira sessão acima.</div>`}
  `;
}

/* ================= AGENDA ================= */
function viewAgenda(){
  const t=todayStr();
  const upcoming=state.events.filter(e=>e.date>=t).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const past=state.events.filter(e=>e.date<t).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  const typeColor={Treino:'var(--tatami-light)',Reunião:'var(--gold-light)','Avaliação':'#7fb3e0',Médico:'#d1583f',Psicólogo:'#c9a6f0',Nutricionista:'#4c9a63',Outro:'var(--text-dim)'};
  function row(e,past){
    const d=daysBetween(t,e.date);
    const athleteName = e.athleteId ? (athleteById(e.athleteId)?.name) : null;
    return `<div class="card" style="display:flex;gap:14px;align-items:center;margin-bottom:8px;${past?'opacity:.55':''}">
      <div style="width:52px;text-align:center;flex:none"><div class="mono" style="font-size:20px;font-weight:700;color:${typeColor[e.type]||'var(--text)'}">${new Date(e.date+'T00:00:00').getDate()}</div><div style="font-size:10.5px;color:var(--text-faint);text-transform:uppercase">${new Date(e.date+'T00:00:00').toLocaleDateString('pt-BR',{month:'short'})}</div></div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">${esc(e.title)} ${e.time?`<span class="mono" style="font-weight:400;color:var(--text-faint);font-size:12px">· ${e.time}</span>`:''}</div><div style="font-size:12px;color:var(--text-faint);margin-top:2px">${esc(e.type)}${athleteName?' · '+esc(athleteName):''}${e.location?' · '+esc(e.location):''}${(!past&&d>=0)?' · '+(d===0?'hoje':d===1?'amanhã':'em '+d+' dias'):''}</div></div>
      <button class="btn btn-ghost btn-icon" data-action="edit-event" data-id="${e.id}">${icon('edit',14)}</button><button class="btn btn-ghost btn-icon btn-danger" data-action="delete-event" data-id="${e.id}">${icon('trash',14)}</button>
    </div>`;
  }
  const returns = computeReturnAlerts(null);
  return `
    ${returns.length?`<div class="section-title" style="margin-top:0"><h2>Retornos previstos</h2></div>
    ${returns.map(r=>{
      const label = r.type==='Nutricionista'?'Retorno nutricional':'Retorno psicológico';
      const when = r.d<0?`atrasado ${Math.abs(r.d)} dia(s)`:r.d===0?'hoje':`em ${r.d} dia(s)`;
      return `<div class="alert ${r.d<0?'danger':(r.d<=3?'warn':'')}">${icon(r.d<0?'alert':'clock',18)}<div><div class="t">${esc(r.athlete.name)}: ${label}</div><div class="d">Última consulta em ${fmtDate(r.lastDate)} · previsto para ${fmtDate(r.returnStr)} (${when})</div></div></div>`;
    }).join('')}` : ''}
    <div class="section-title" ${returns.length?'':'style="margin-top:0"'}><h2>Próximos eventos</h2></div>
    ${upcoming.length?upcoming.map(e=>row(e,false)).join(''):`<div class="empty">${icon('calendar',30)}<div class="title">Nenhum evento agendado</div>Adicione treinos, avaliações, consultas ou reuniões.</div>`}
    ${past.length?`<div class="section-title"><h2>Eventos passados</h2></div>${past.map(e=>row(e,true)).join('')}`:''}`;
}

/* ================= PROVAS ================= */

  return `${list.length?list.map(c=>{

            <div><div class="lbl" style="margin-bottom:6px">Derrotas</div><div style="display:flex;gap:8px;flex-wrap:wrap">${WL_KEYS.map(k=>`<div><label style="display:block;font-size:10.5px;color:var(--text-faint);margin-bottom:3px">${WL_LABELS[k]}</label><input type="number" min="0" class="input wl-input mono" data-action="set-wl" data-comp="${c.id}" data-athlete="${e.athleteId}" data-side="losses" data-key="${k}" value="${l[k]||0}"></div>`).join('')}</div></div>
          </div>
        </details>
      </div>`;
    }).join(''):`<div class="empty" style="padding:24px">${icon('users',28)}<div class="title">Nenhum inscrito</div>Adicione atletas a esta prova.</div>`}

/* ================= RELATÓRIOS ================= */
function viewReports(){
  const days=state.ui.reportRange; const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days); const cutoffStr=cutoff.toISOString().slice(0,10);
  const athleteSel=state.ui.reportAthlete;
  const rangeOptions=[{v:30,l:'Últimos 30 dias'},{v:90,l:'Últimos 3 meses'},{v:180,l:'Últimos 6 meses'},{v:365,l:'Último ano'}];
  const selector=`<div class="toolbar">
    <select class="select" style="width:auto" id="report-range">${rangeOptions.map(o=>`<option value="${o.v}" ${days===o.v?'selected':''}>${o.l}</option>`).join('')}</select>
    <select class="select" style="width:auto" id="report-athlete"><option value="">Geral (todos os atletas)</option>${activeAthletes().map(a=>`<option value="${a.id}" ${athleteSel===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
    <button class="btn" data-action="export-csv">${icon('download',15)} Exportar CSV</button>
  </div>`;

  if(athleteSel){
    const a=athleteById(athleteSel);
    if(!a){ state.ui.reportAthlete=''; return viewReports(); }
    const rate=attendanceRate(a.id,days);
    const sessionsInRange=Object.entries(state.sessions).filter(([k])=>k.split('__')[0]>=cutoffStr);
    const pses=[]; sessionsInRange.forEach(([,s])=>{ const r=s.records[a.id]; if(r&&r.pse!=null) pses.push(r.pse); });
    const avgPse=pses.length?(pses.reduce((x,y)=>x+y,0)/pses.length).toFixed(1):'—';
    const acwr=computeACWR(a.id); const info=acwrInfo(acwr);
    const insights=weighInsights(a);
    const weighInsInRange=(a.weighIns||[]).filter(w=>w.date>=cutoffStr);
    const injuriesInRange=(a.injuries||[]).filter(i=>i.date>=cutoffStr);
    const absenceRows=[];
    sessionsInRange.forEach(([key,s])=>{
      const r=s.records[a.id];
      if(r && ['falta','justificada','atestado'].includes(r.status)){
        const [date,n]=key.split('__');
        absenceRows.push({date,n,status:r.status,obs:r.obs||''});
      }
    });
    absenceRows.sort((x,y)=>y.date.localeCompare(x.date));
    const compsInRange=state.competitions.filter(c=>c.date>=cutoffStr && (c.entries||[]).some(e=>e.athleteId===a.id));
    return `${selector}
      <div class="grid grid-4">
        <div class="card stat-card"><div class="lbl">Frequência</div><div class="val mono">${rate===null?'—':rate+'%'}</div></div>
        <div class="card stat-card"><div class="lbl">PSE médio</div><div class="val mono">${avgPse}</div></div>
        <div class="card stat-card"><div class="lbl">ACWR</div><div class="val mono" style="color:${info.color}">${acwr===null?'—':acwr}</div><div class="sub" style="color:${info.color}">${info.label}</div></div>
        <div class="card stat-card"><div class="lbl">Pesagens no período</div><div class="val mono">${weighInsInRange.length}</div></div>
      </div>
      <div class="section-title"><h2>Pesagem</h2></div>
      <div class="card"><div style="color:${insights.catText?insights.catText.color:'var(--text-faint)'};font-size:13.5px">${insights.catText?insights.catText.text:'Sem categoria/pesagens suficientes para comparar.'}</div>${insights.lastTwoDiff!=null?`<div style="margin-top:8px;font-size:12.5px;color:var(--text-dim)">Variação entre últimas 2 pesagens: <span class="mono">${insights.lastTwoDiff>0?'+':''}${insights.lastTwoDiff} kg</span></div>`:''}</div>
      <div class="section-title"><h2>Faltas no período</h2></div>
      ${absenceRows.length?`<div class="table-wrap"><table><tr><th>Data</th><th>Sessão</th><th>Situação</th><th>Observação</th></tr>
      ${absenceRows.map(r=>`<tr><td>${fmtDate(r.date)}</td><td>Treino ${r.n}</td><td style="color:${STATUS_META[r.status].color};font-weight:600">${STATUS_META[r.status].label}</td><td>${esc(r.obs)||'—'}</td></tr>`).join('')}</table></div>`:`<div class="empty" style="padding:20px">Nenhuma falta registrada no período.</div>`}
      <div class="section-title"><h2>Lesões no período</h2></div>
      ${injuriesInRange.length?`<table><tr><th>Data</th><th>Descrição</th><th>Status</th></tr>${injuriesInRange.map(i=>`<tr><td>${fmtDate(i.date)}</td><td>${esc(i.description||'—')}</td><td>${i.status==='ativa'?'Ativa':'Recuperada'}</td></tr>`).join('')}</table>`:`<div class="empty" style="padding:20px">Nenhuma lesão no período.</div>`}
      <div class="section-title"><h2>Competições no período</h2></div>
      ${compsInRange.length?`<div class="table-wrap"><table><tr><th>Prova</th><th>Data</th><th>V-D</th><th colspan="4" style="text-align:center">Vitórias (detalhe)</th><th colspan="4" style="text-align:center">Derrotas (detalhe)</th></tr>
      ${compsInRange.map(c=>{ const e=(c.entries||[]).find(x=>x.athleteId===a.id); const w=e.wins||{},l=e.losses||{}; const t=entryTotals(e);
        return `<tr><td>${esc(c.name)}</td><td>${compDateLabel(c)}</td><td class="mono">${t.w}V-${t.l}D</td>${WL_KEYS.map(k=>`<td class="mono" style="text-align:center">${w[k]||0}</td>`).join('')}${WL_KEYS.map(k=>`<td class="mono" style="text-align:center">${l[k]||0}</td>`).join('')}</tr>`;
      }).join('')}</table></div>`:`<div class="empty" style="padding:20px">Nenhuma competição no período.</div>`}
    `;
  }

  const sessionsInRange=Object.entries(state.sessions).filter(([k])=>k.split('__')[0]>=cutoffStr);
  let totalRecs=0,presentRecs=0,pseSum=0,pseCount=0;
  sessionsInRange.forEach(([,s])=>Object.values(s.records).forEach(r=>{ if(statusWeight(r.status)!==null) totalRecs++; if(r.status==='presente'||r.status==='competicao') presentRecs++; if(r.pse!=null){pseSum+=r.pse;pseCount++;} }));
  let weighInsInRange=0; state.athletes.forEach(a=>(a.weighIns||[]).forEach(w=>{ if(w.date>=cutoffStr) weighInsInRange++; }));
  let injuriesOpened=0,injuriesClosed=0; state.athletes.forEach(a=>(a.injuries||[]).forEach(i=>{ if(i.date>=cutoffStr) injuriesOpened++; if(i.status!=='ativa') injuriesClosed++; }));
  let totalWins=0,totalLosses=0; state.competitions.forEach(c=>{ if(c.date>=cutoffStr) (c.entries||[]).forEach(e=>{ const t=entryTotals(e); totalWins+=t.w; totalLosses+=t.l; }); });
  const perAthlete=activeAthletes().map(a=>({a,rate:attendanceRate(a.id,days),pse:(()=>{ const ps=[]; sessionsInRange.forEach(([,s])=>{ const r=s.records[a.id]; if(r&&r.pse!=null) ps.push(r.pse); }); return ps.length?(ps.reduce((x,y)=>x+y,0)/ps.length).toFixed(1):'—'; })(),acwr:computeACWR(a.id)})).sort((x,y)=>(y.rate??-1)-(x.rate??-1));
  return `${selector}
    <div class="grid grid-4">
      <div class="card stat-card"><div class="lbl">Sessões</div><div class="val mono">${sessionsInRange.length}</div></div>
      <div class="card stat-card"><div class="lbl">Frequência média</div><div class="val mono">${totalRecs?Math.round(presentRecs/totalRecs*100)+'%':'—'}</div></div>
      <div class="card stat-card"><div class="lbl">PSE médio</div><div class="val mono">${pseCount?(pseSum/pseCount).toFixed(1):'—'}</div></div>
      <div class="card stat-card"><div class="lbl">Vitórias / Derrotas</div><div class="val mono">${totalWins}/${totalLosses}</div></div>
    </div>
    <div class="grid grid-2" style="margin-top:16px">
      <div class="card"><div class="lbl">Pesagens registradas</div><div class="val mono">${weighInsInRange}</div></div>
      <div class="card"><div class="lbl">Lesões abertas / recuperadas</div><div class="val mono">${injuriesOpened} / ${injuriesClosed}</div></div>
    </div>
    <div class="section-title"><h2>Frequência por atleta</h2></div>
    ${perAthlete.length?`<table><tr><th>Atleta</th><th>Frequência</th><th>PSE médio</th><th>ACWR</th></tr>
    ${perAthlete.map(p=>`<tr><td>${esc(p.a.name)}</td><td class="mono">${p.rate===null?'—':p.rate+'%'}</td><td class="mono">${p.pse}</td><td class="mono" style="color:${acwrInfo(p.acwr).color}">${p.acwr===null?'—':p.acwr}</td></tr>`).join('')}</table>`:`<div class="empty">${icon('chart',28)}<div class="title">Sem dados no período</div></div>`}
  `;
}

/* ================= Modals ================= */
function openModal(html){ const ov=document.createElement('div'); ov.className='overlay'; ov.id='modal-overlay'; ov.innerHTML=`<div class="modal">${html}</div>`; ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); }); document.body.appendChild(ov); }
function closeModal(){ const ov=document.getElementById('modal-overlay'); if(ov) ov.remove(); }
// Native confirm()/alert() are blocked inside the sandboxed artifact iframe, so we use our own modal instead.
function confirmDialog(message){
  return new Promise(resolve=>{
    openModal(`
      <div class="modal-head"><h3>Confirmar ação</h3></div>
      <div class="modal-body"><p style="margin:0;font-size:14px;color:var(--text-dim);line-height:1.5">${esc(message)}</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" id="confirm-cancel-btn">Cancelar</button><button class="btn" id="confirm-ok-btn" style="background:var(--danger);border-color:var(--danger);color:#fff">Confirmar</button></div>
    `);
    document.getElementById('confirm-cancel-btn').onclick=()=>{ closeModal(); resolve(false); };
    document.getElementById('confirm-ok-btn').onclick=()=>{ closeModal(); resolve(true); };
  });
}

/* ================= Event handling ================= */
let listenersAttached=false;
function attachGlobalListeners(){
  if(listenersAttached) return; listenersAttached=true;
  // Delegated on `document` (not just #app) because modals are appended to document.body, outside #app.

  document.addEventListener('click', async (e)=>{
    const btn=e.target.closest('[data-action]'); if(!btn) return;
    const action=btn.dataset.action;

    if(action==='nav'){ state.view=btn.dataset.view; state.ui.selectedAthlete=null; state.ui.selectedCompetition=null; render(); return; }
    if(action==='open-athlete'){ state.ui.selectedAthlete=btn.dataset.id; render(); return; }
    if(action==='back-athletes'){ state.ui.selectedAthlete=null; render(); return; }
    if(action==='athlete-tab'){ const a=athleteById(btn.dataset.id); a._tab=btn.dataset.tab; render(); return; }
    if(action==='new-athlete'){ athleteFormModal(null); return; }
    if(action==='edit-athlete'){ athleteFormModal(athleteById(btn.dataset.id)); return; }
    if(action==='delete-athlete'){ const ok=await confirmDialog('Remover este atleta? Esta ação não pode ser desfeita.'); if(ok){ state.athletes=state.athletes.filter(a=>a.id!==btn.dataset.id); persist('athletes'); if(state.ui.selectedAthlete===btn.dataset.id) state.ui.selectedAthlete=null; render(); toast('Atleta removido.'); } return; }
    if(action==='close-modal'){ closeModal(); return; }

    if(action==='save-athlete'){
      const id=btn.dataset.id;
      const birth=document.getElementById('f-birth').value.trim();
      const classe=classFromBirthdate(birth);
      const name=document.getElementById('f-name').value.trim();
      if(!name){ toast('Informe o nome do atleta.'); return; }
      if(!classe){ toast('Informe uma data de nascimento válida (DD/MM/AAAA).'); return; }
      const data={name,birthdate:birth,classe,category:document.getElementById('f-category').value};
      if(id){ Object.assign(athleteById(id),data); toast('Atleta atualizado.'); }
      else{ state.athletes.push({id:uid(),active:true,createdAt:todayStr(),weighIns:[],injuries:[],...data}); toast('Atleta cadastrado.'); }
      persist('athletes'); closeModal(); render();
      return;
    }

    if(action==='add-weighin'){ weighInModal(btn.dataset.id); return; }
    if(action==='confirm-weighin'){
      const a=athleteById(btn.dataset.id); const date=document.getElementById('wi-date').value; const w=parseFloat(document.getElementById('wi-weight').value);
      if(!date||!w){ toast('Informe data e peso.'); return; }
      a.weighIns=a.weighIns||[]; a.weighIns=a.weighIns.filter(x=>x.date!==date); a.weighIns.push({date,weight:w}); a.weighIns.sort((x,y)=>x.date.localeCompare(y.date));
      persist('athletes'); closeModal(); render(); toast('Pesagem registrada.');
      return;
    }
    if(action==='del-weighin'){ const a=athleteById(btn.dataset.id); a.weighIns=(a.weighIns||[]).filter(w=>w.date!==btn.dataset.date); persist('athletes'); render(); return; }
    if(action==='add-injury'){ injuryModal(btn.dataset.id); return; }
    if(action==='confirm-injury'){
      const a=athleteById(btn.dataset.id); const desc=document.getElementById('inj-desc').value.trim(); const date=document.getElementById('inj-date').value; const ret=document.getElementById('inj-return').value;
      a.injuries=a.injuries||[]; a.injuries.push({id:uid(),description:desc,date,returnDate:ret,status:'ativa'});
      persist('athletes'); closeModal(); render(); toast('Lesão registrada.');
      return;
    }
    if(action==='resolve-injury'){ const a=athleteById(btn.dataset.id); const inj=(a.injuries||[]).find(i=>i.id===btn.dataset.inj); if(inj) inj.status='recuperada'; persist('athletes'); render(); return; }
    if(action==='del-injury'){ const a=athleteById(btn.dataset.id); a.injuries=(a.injuries||[]).filter(i=>i.id!==btn.dataset.inj); persist('athletes'); render(); return; }

    if(action==='set-att-session'){ state.ui.attSession=parseInt(btn.dataset.n,10); render(); return; }
    if(action==='save-session'){
      const key=btn.dataset.key; const type=document.getElementById('att-type').value; const records={};
      document.querySelectorAll('[data-att-row]').forEach(row=>{
        const id=row.dataset.id;
        const status=row.querySelector('[data-status-select]').value;
        const pseVal=row.querySelector('[data-pse]').value;
        const obsVal=row.querySelector('[data-obs]').value.trim();
        records[id]={status, pse: status==='presente'&&pseVal!==''?parseInt(pseVal,10):null, obs:obsVal};
      });
      state.sessions[key]={type,notes:'',records}; persist('sessions'); render(); toast('Sessão salva.');
      return;
    }
    if(action==='load-session'){ const [d,n]=btn.closest('tr').dataset.key.split('__'); state.ui.attDate=d; state.ui.attSession=parseInt(n,10); render(); return; }

    if(action==='new-event'){ eventModal(null); return; }
    if(action==='edit-event'){ eventModal(state.events.find(x=>x.id===btn.dataset.id)); return; }
    if(action==='delete-event'){ const ok=await confirmDialog('Remover este evento?'); if(ok){ state.events=state.events.filter(x=>x.id!==btn.dataset.id); persist('events'); render(); toast('Evento removido.'); } return; }
    if(action==='save-event'){
      const id=btn.dataset.id;
      const type=document.getElementById('ev-type').value;
      const athleteSel=document.getElementById('ev-athlete');
      const data={title:document.getElementById('ev-title').value.trim(),date:document.getElementById('ev-date').value,time:document.getElementById('ev-time').value,type,location:document.getElementById('ev-location').value.trim(),notes:document.getElementById('ev-notes').value.trim(),athleteId:APPOINTMENT_TYPES.includes(type)&&athleteSel?athleteSel.value:''};
      if(!data.title||!data.date){ toast('Informe título e data.'); return; }
      if(id){ Object.assign(state.events.find(x=>x.id===id),data); } else { state.events.push({id:uid(),...data}); }
      persist('events'); closeModal(); render(); toast('Evento salvo.');
      return;
    }
    if(action==='new-competition'){ competitionModal(null); return; }
    if(action==='edit-competition'){ competitionModal(state.competitions.find(x=>x.id===btn.dataset.id)); return; }
    if(action==='delete-competition'){ const ok=await confirmDialog('Remover esta prova?'); if(ok){ state.competitions=state.competitions.filter(x=>x.id!==btn.dataset.id); persist('competitions'); render(); toast('Prova removida.'); } return; }
    if(action==='save-competition'){
      const id=btn.dataset.id;
      const data={name:document.getElementById('c-name').value.trim(),date:document.getElementById('c-date').value,endDate:document.getElementById('c-enddate').value,location:document.getElementById('c-location').value.trim(),notes:document.getElementById('c-notes').value.trim()};
      if(!data.name||!data.date){ toast('Informe nome e data.'); return; }
      if(data.endDate && data.endDate<data.date){ toast('A data de término não pode ser antes da data de início.'); return; }
      if(id){ Object.assign(state.competitions.find(x=>x.id===id),data); } else { state.competitions.push({id:uid(),entries:[],...data}); }
      persist('competitions'); closeModal(); render(); toast('Prova salva.');
      return;
    }
    if(action==='open-competition'){ state.ui.selectedCompetition=btn.dataset.id; render(); return; }
    if(action==='back-competitions'){ state.ui.selectedCompetition=null; render(); return; }
    if(action==='add-entry'){
      const c=state.competitions.find(x=>x.id===btn.dataset.id); const sel=document.getElementById('entry-athlete'); const athleteId=sel.value; if(!athleteId) return;
      const a=athleteById(athleteId);
      c.entries=c.entries||[]; c.entries.push({athleteId,category:a.category||'',totalWins:0,totalLosses:0,wins:{ippon:0,wazari:0,yuko:0,hansoku:0},losses:{ippon:0,wazari:0,yuko:0,hansoku:0}});
      persist('competitions'); render(); toast('Inscrito adicionado.');
      return;
    }
    if(action==='del-entry'){ const c=state.competitions.find(x=>x.id===btn.dataset.comp); c.entries=(c.entries||[]).filter(e=>e.athleteId!==btn.dataset.athlete); persist('competitions'); render(); return; }

    if(action==='save-settings'){
      state.settings.academyName=document.getElementById('set-academy').value.trim()||'Meu Dojô';
      state.settings.categories=document.getElementById('set-categories').value.split(',').map(s=>s.trim()).filter(Boolean);
      persist('settings'); render(); toast('Ajustes salvos.');
      return;
    }
    if(action==='export-json'){
      const blob=new Blob([JSON.stringify({athletes:state.athletes,sessions:state.sessions,events:state.events,competitions:state.competitions,settings:state.settings},null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download='tatame-dados.json'; link.click(); URL.revokeObjectURL(url); return;
    }
    if(action==='export-csv'){
      const rows=[['Atleta','Classe','Categoria','Frequência (%)','PSE médio','ACWR']];
      activeAthletes().forEach(a=>{ const rate=attendanceRate(a.id,state.ui.reportRange); const acwr=computeACWR(a.id); rows.push([a.name,athleteClasse(a),a.category||'',rate===null?'':rate,'',acwr===null?'':acwr]); });
      const csv=rows.map(r=>r.map(v=>`"${(v??'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download='relatorio-tatame.csv'; link.click(); URL.revokeObjectURL(url); return;
    }
    if(action==='load-demo'){ const ok=await confirmDialog('Isso adicionará atletas e registros de exemplo. Continuar?'); if(!ok) return; loadDemoData(); render(); toast('Dados de exemplo carregados.'); return; }
    if(action==='clear-data'){
      const ok=await confirmDialog('Apagar TODOS os dados do app? Esta ação não pode ser desfeita.');
      if(!ok) return;
      state.athletes=[]; state.sessions={}; state.events=[]; state.competitions=[];
      ['athletes','sessions','events','competitions'].forEach(persist); render(); toast('Dados apagados.'); return;
    }

    if(action==='status-noop') return;
  });

  // status select change -> toggle pse/obs
  document.addEventListener('change',(e)=>{
    if(e.target.matches('[data-status-select]')){
      const row=e.target.closest('[data-att-row]'); const status=e.target.value;
      e.target.style.color=STATUS_META[status].color;
      const pse=row.querySelector('[data-pse]'); const obs=row.querySelector('[data-obs]');
      if(status==='presente'){ pse.disabled=false; obs.style.display='none'; }
      else{ pse.disabled=true; pse.value=''; obs.style.display=['falta','justificada','atestado'].includes(status)?'block':'none'; }
      return;
    }
    if(e.target.id==='class-filter'){ state.ui.classFilter=e.target.value; renderView(); return; }
    if(e.target.id==='att-date'){ state.ui.attDate=e.target.value; render(); return; }
    if(e.target.id==='att-type'){ state.ui.attType=e.target.value; return; }
    if(e.target.id==='ev-type'){ const wrap=document.getElementById('ev-athlete-wrap'); if(wrap) wrap.style.display=APPOINTMENT_TYPES.includes(e.target.value)?'block':'none'; return; }
    if(e.target.id==='report-range'){ state.ui.reportRange=parseInt(e.target.value,10); renderView(); return; }
    if(e.target.id==='report-athlete'){ state.ui.reportAthlete=e.target.value; renderView(); return; }
    if(e.target.dataset.action==='set-wl'){
      const c=state.competitions.find(x=>x.id===e.target.dataset.comp); const entry=c.entries.find(x=>x.athleteId===e.target.dataset.athlete);
      entry[e.target.dataset.side][e.target.dataset.key]=parseInt(e.target.value,10)||0;
      entry.totalWins=WL_KEYS.reduce((s,k)=>s+(entry.wins[k]||0),0);
      entry.totalLosses=WL_KEYS.reduce((s,k)=>s+(entry.losses[k]||0),0);
      persist('competitions'); renderView(); return;
    }
    if(e.target.dataset.action==='set-total'){
      const c=state.competitions.find(x=>x.id===e.target.dataset.comp); const entry=c.entries.find(x=>x.athleteId===e.target.dataset.athlete);
      entry[e.target.dataset.side]=parseInt(e.target.value,10)||0;
      persist('competitions'); return;
    }
    if(e.target.id==='import-json'){
      const file=e.target.files[0]; if(!file) return; const reader=new FileReader();
      reader.onload=()=>{ try{ const data=JSON.parse(reader.result);
        state.athletes=data.athletes||[]; state.sessions=data.sessions||{}; state.events=data.events||[]; state.competitions=data.competitions||[]; state.settings=data.settings||state.settings;
        ['athletes','sessions','events','competitions','settings'].forEach(persist); render(); toast('Dados importados.');
      }catch(err){ toast('Arquivo inválido.'); } };
      reader.readAsText(file); return;
    }
  });

  // pse input -> auto set presence
  document.addEventListener('input',(e)=>{
    if(e.target.id==='athlete-search'){ state.ui.search=e.target.value; renderView(); return; }
    if(e.target.id==='f-birth'){
      const pos=e.target.selectionStart; const before=e.target.value.length; e.target.value=maskBRDate(e.target.value); const after=e.target.value.length;
      try{ e.target.setSelectionRange(pos+(after-before), pos+(after-before)); }catch(err){}
      const preview=document.getElementById('f-classe-preview');
      const cls=classFromBirthdate(e.target.value);
      preview.innerHTML = cls ? classBadge(cls) : '<span style="color:var(--text-faint);font-size:12.5px">Informe a data de nascimento</span>';
      return;
    }
    if(e.target.matches('[data-pse]')){
      const row=e.target.closest('[data-att-row]'); const select=row.querySelector('[data-status-select]'); const obs=row.querySelector('[data-obs]');
      if(e.target.value!==''){ select.value='presente'; select.style.color=STATUS_META['presente'].color; obs.style.display='none'; }
      else{ select.value='falta'; select.style.color=STATUS_META['falta'].color; obs.style.display='block'; }
      return;
    }
  });
}

function loadDemoData(){
  const names=['Ana Souza','Bruno Lima','Carla Nunes','Diego Alves','Elisa Prado','Felipe Rocha'];
  const cats=state.settings.categories||CATEGORIES;
  const birthYears=[2013,2011,2009,2007,2003,2010];
  state.athletes=names.map((n,i)=>{
    const br=`1${i}/0${(i%9)+1}/${birthYears[i]}`;
    return {id:uid(),name:n,birthdate:br,classe:classFromBirthdate(br),category:cats[i%cats.length],active:true,createdAt:todayStr(),
      weighIns:[0,1,2,3].map(k=>({date:new Date(Date.now()-(90-k*25)*86400000).toISOString().slice(0,10),weight:+(50+i*4+k*0.6).toFixed(1)})),
      injuries:i===3?[{id:uid(),description:'Entorse de tornozelo',date:new Date(Date.now()-5*86400000).toISOString().slice(0,10),status:'ativa'}]:[]};
  });
  for(let k=0;k<12;k++){
    const d=new Date(Date.now()-k*2*86400000); const dow=d.getDay(); const dateStr=d.toISOString().slice(0,10);
    const sessNums=(dow===2||dow===4)?[1,2]:[1];
    sessNums.forEach(n=>{
      const records={};
      state.athletes.forEach(a=>{
        const roll=Math.random();
        let status='presente',pse=null;
        if(roll<0.7){ status='presente'; pse=Math.round(4+Math.random()*5); }
        else if(roll<0.8) status='falta';
        else if(roll<0.87) status='justificada';
        else if(roll<0.93) status='atestado';
        else if(roll<0.97) status='competicao';
        else status='dispensa';
        records[a.id]={status,pse:status==='presente'?pse:null,obs:''};
      });
      state.sessions[dateStr+'__'+n]={type:'Treino',notes:'',records};
    });
  }
  state.events=[
    {id:uid(),date:new Date(Date.now()+3*86400000).toISOString().slice(0,10),time:'19:00',title:'Treino técnico',type:'Treino',location:'Tatame principal',notes:'',athleteId:''},
    {id:uid(),date:new Date(Date.now()+10*86400000).toISOString().slice(0,10),time:'09:00',title:'Avaliação de faixa',type:'Avaliação',location:'Dojô',notes:'',athleteId:''},
    {id:uid(),date:new Date(Date.now()-50*86400000).toISOString().slice(0,10),time:'14:00',title:'Consulta nutricional',type:'Nutricionista',location:'Clínica',notes:'',athleteId:state.athletes[0].id},
    {id:uid(),date:new Date(Date.now()-10*86400000).toISOString().slice(0,10),time:'16:00',title:'Sessão de psicologia esportiva',type:'Psicólogo',location:'Consultório',notes:'',athleteId:state.athletes[1].id},
  ];
  state.competitions=[
    {id:uid(),name:'Copa Regional de Judô',date:new Date(Date.now()+12*86400000).toISOString().slice(0,10),endDate:new Date(Date.now()+13*86400000).toISOString().slice(0,10),location:'Ginásio Municipal',notes:'',entries:[
      {athleteId:state.athletes[0].id,category:state.athletes[0].category,totalWins:3,totalLosses:1,wins:{ippon:2,wazari:1,yuko:0,hansoku:0},losses:{ippon:0,wazari:1,yuko:0,hansoku:0}},
      {athleteId:state.athletes[1].id,category:state.athletes[1].category,totalWins:1,totalLosses:1,wins:{ippon:0,wazari:0,yuko:1,hansoku:0},losses:{ippon:1,wazari:0,yuko:0,hansoku:0}},
    ]},
  ];
  ['athletes','sessions','events','competitions'].forEach(persist);
}

window.addEventListener('unhandledrejection', function(ev){
  console.error(ev.reason);
  const app=document.getElementById('app');
  if(app) app.innerHTML = `<div style="padding:30px;font-family:'IBM Plex Mono',monospace;color:#f2f0ea;background:#12151a;min-height:100vh;white-space:pre-wrap;font-size:13px;line-height:1.6"><div style="color:#d1583f;font-weight:700;margin-bottom:10px">Erro ao carregar dados do Tatame:</div>${ev.reason&&ev.reason.message?ev.reason.message:ev.reason}\n\n${ev.reason&&ev.reason.stack?ev.reason.stack:''}</div>`;
});
loadAll().catch(err=>{
  console.error(err);
  const app=document.getElementById('app');
  if(app) app.innerHTML = `<div style="padding:30px;font-family:'IBM Plex Mono',monospace;color:#f2f0ea;background:#12151a;min-height:100vh;white-space:pre-wrap;font-size:13px;line-height:1.6"><div style="color:#d1583f;font-weight:700;margin-bottom:10px">Erro ao iniciar o Tatame:</div>${err.message}\n\n${err.stack||''}</div>`;
});
</script>
</body>
